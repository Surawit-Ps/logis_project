version: '3.8'

services:
  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: logis-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - logis-network
    environment:
      - VITE_API_URL=http://backend:3000

  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: logis-backend
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    networks:
      - logis-network
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=logis_user
      - DB_PASSWORD=logis_password
      - DB_NAME=logis_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=SvNQpBN8y3qlVrsGAYYWoJJk56LtzFHx
      - PORT=3000
    volumes:
      - ./backend:/app

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: logis-db
    ports:
      - "5432:5432"
    networks:
      - logis-network
    environment:
      - POSTGRES_USER=logis_user
      - POSTGRES_PASSWORD=logis_password
      - POSTGRES_DB=logis_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logis_user -d logis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis service
  redis:
    image: redis:7-alpine
    container_name: logis-redis
    ports:
      - "6379:6379"
    networks:
      - logis-network
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  logis-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
